<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Sistema Biblioteca Escolar — Login">
    <meta name="author" content="Lucas Sant'Ana Dias">

    <title>Biblioteca Escolar — Acesso</title>

    <link rel="stylesheet" href="style/login.css">

    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <main class="lb-card">

        <!-- PAINEL ESQUERDO -->
        <section class="left-panel">

            <div class="left-pattern"></div>

            <div class="left-top">

                <h1 class="left-title">Biblioteca Escolar</h1>

                <p class="left-desc">
                    Sistema integrado de gestão de acervo e empréstimos.
                </p>

            </div>

            <div class="left-bottom">

                <p class="left-quote">
                    "A leitura é o exercício pleno da inteligência."
                </p>

            </div>

        </section>

        <!-- PAINEL DIREITO -->
        <section class="right-panel">

            <div class="form-box">

                <!-- CABEÇALHO -->
                <header class="form-header">

                    <h2>Acesso ao Sistema</h2>

                    <p>
                        Selecione seu perfil e insira suas credenciais
                    </p>

                </header>

                <!-- PERFIS -->
                <div class="role-group">

                    <button
                        type="button"
                        class="role-opt"
                        id="opt-professor"
                        onclick="selectRole('professor')"
                        aria-label="Selecionar perfil Professor">

                        <div class="role-dot"></div>

                        <div class="role-text">
                            <strong>Professor</strong>
                            
                        </div>

                    </button>

                    <button
                        type="button"
                        class="role-opt"
                        id="opt-aluno"
                        onclick="selectRole('aluno')"
                        aria-label="Selecionar perfil Aluno">

                        <div class="role-dot"></div>

                        <div class="role-text">
                            <strong>Aluno</strong>
                            
                        </div>

                    </button>

                </div>

                <!-- IDENTIFICAÇÃO -->
                <div class="field">

                    <label
                        id="lbl-id"
                        for="inp-id">
                        Identificação
                    </label>

                    <input
                        type="text"
                        id="inp-id"
                        placeholder="Digite sua identificação"
                        autocomplete="off"
                        required>

                </div>

                <!-- SENHA -->
                <div class="field">

                   <div class="field">

    <div class="field-row">

        <label for="inp-senha">
            Senha
        </label>

        <a
            class="forgot"
            href="#">
            Esqueceu?
        </a>

    </div>

    <div class="password-wrapper">

        <input
            type="password"
            id="inp-senha"
            placeholder="••••••••"
            required>

        <button
            type="button"
            id="toggle-password"
            class="toggle-password"
            aria-label="Mostrar senha">

            <svg
                id="eye-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2">

                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z"/>

                <circle
                    cx="12"
                    cy="12"
                    r="3"/>

            </svg>

        </button>

    </div>

</div>
                <!-- BOTÃO -->
                <button
                    type="button"
                    class="btn-submit"
                    id="btn-entrar"
                    onclick="handleLogin()">

                    Entrar

                </button>

                <!-- FEEDBACK -->
                <div
                    id="msg-feedback"
                    class="msg">
                </div>

                <!-- CADASTRO -->
                <div class="register-text">

                    Não possui conta?

                    <a href="cadastro.html">
                        Cadastre-se
                    </a>

                </div>

                <!-- SUPORTE -->
                <div class="help-text">

                    Problemas de acesso?

                    <a href="#">
                        Contate a secretaria
                    </a>

                </div>

            </div>

        </section>

    </main>

    <script
        type="module"
        src="script/login.js">
    </script>

</body>

</html>
