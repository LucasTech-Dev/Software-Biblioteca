<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema Biblioteca Escolar - Novo livro">
  <title>BibliotecaEscolar - Novo Livro</title>
  <link rel="stylesheet" href="style/addLivros.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <div class="logo">
      <span class="logo-mark">Instituto Estadual Riachuelo</span>
      <span class="logo-tag">Biblioteca Online</span>
    </div>
    <span class="header-meta">Versão 1.0</span>
  </header>

  <div class="page active" id="page-adicionar">

    <nav class="breadcrumb">
      <a href="telaProfessor.html">Início</a>
      <span class="breadcrumb-sep">›</span>
      <a href="acervo.html">Acervo</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">Novo Livro</span>
    </nav>

    <div class="add-hero">
      <h1>Adicionar<br><span>Novo Livro</span></h1>
      <p class="add-hero-desc">Cadastre novos títulos no acervo informando o nome, autor e ISBN. A capa será buscada automaticamente.</p>
    </div>

    <div class="add-main">

      <div class="add-panel">
        <div class="add-panel-field">
          <label for="add-titulo">Título do livro</label>
          <input type="text" id="add-titulo" placeholder="Ex: Dom Casmurro">
        </div>

        <div class="add-panel-field">
          <label for="add-autor">Autor</label>
          <input type="text" id="add-autor" placeholder="Ex: Machado de Assis">
        </div>

        <div class="add-panel-field">
          <label for="add-isbn">ISBN</label>
          <input type="text" id="add-isbn" placeholder="Ex: 9788535902775">
        </div>

        <button class="btn-primary btn-add-book" onclick="adicionarLivro()">
          ＋ Adicionar
        </button>
      </div>

      <div class="added-section-title">Livros Cadastrados</div>
      <div class="catalogo-grid" id="catalogo-grid"></div>

    </div>

    <footer>
      <span>BibliotecaEscolar - Sistema de Gestão &copy; 2025</span>
      <span>Módulo: Acervo v1.0</span>
    </footer>

  </div>

  <script src="script/addLivros.js"></script>

</body>
</html>
