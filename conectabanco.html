<!DOCTYPE html>

<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Criar Coleções Firestore</title>


  <style>

    body {

      font-family: Arial;

      background: #f5f5f5;

      padding: 30px;
    }


    h1 {

      margin-bottom: 20px;
    }


    button {

      padding: 12px 20px;

      border: none;

      border-radius: 8px;

      cursor: pointer;

      background: #111;

      color: white;

      margin-bottom: 10px;
    }


    #log {

      margin-top: 20px;

      background: white;

      padding: 20px;

      border-radius: 10px;
    }

  </style>

</head>

<body>

  <h1>Criar Estrutura Firestore</h1>


  <button onclick="criarEstrutura()">

    Criar Banco

  </button>


  <div id="log"></div>



  <script type="module">

    // ========================================
    // IMPORTS
    // ========================================

    import { initializeApp }

    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";


    import {

      getFirestore,

      doc,
      setDoc

    }

    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";



    // ========================================
    // FIREBASE CONFIG
    // ========================================

    const firebaseConfig = {

      apiKey: "SUA_API_KEY",

      authDomain: "SEU_AUTH_DOMAIN",

      projectId: "SEU_PROJECT_ID",

      storageBucket: "SEU_STORAGE_BUCKET",

      messagingSenderId: "SEU_SENDER_ID",

      appId: "SEU_APP_ID"
    };



    // ========================================
    // INIT
    // ========================================

    const app =
      initializeApp(firebaseConfig);


    const db =
      getFirestore(app);




    // ========================================
    // CRIAR ESTRUTURA
    // ========================================

    window.criarEstrutura =
    async function () {


      const log =
        document.getElementById("log");


      log.innerHTML =
        "Criando coleções...";



      try {


        // ====================================
        // USUÁRIOS
        // ====================================

        await setDoc(

          doc(db, "usuarios", "uid_001"),

          {

            nome: "Lucas Sant'ana",

            email: "lucas@gmail.com",

            tipo: "aluno",

            turma: "2A",

            matricula: "2026001",

            ativo: true
          }
        );



        // ====================================
        // LIVROS
        // ====================================

        await setDoc(

          doc(db, "livros", "livro_001"),

          {

            titulo: "Dom Casmurro",

            autor: "Machado de Assis",

            categoria: "Literatura",

            quantidade: 5,

            disponiveis: 3
          }
        );



        await setDoc(

          doc(db, "livros", "livro_002"),

          {

            titulo: "Harry Potter",

            autor: "J.K Rowling",

            categoria: "Fantasia",

            quantidade: 10,

            disponiveis: 8
          }
        );



        // ====================================
        // EMPRESTIMOS
        // ====================================

        await setDoc(

          doc(db, "emprestimos", "emp_001"),

          {

            usuarioId: "uid_001",

            livroId: "livro_001",

            status: "ativo",

            dataEmprestimo: "2026-05-19"
          }
        );



        // ====================================
        // RESERVAS
        // ====================================

        await setDoc(

          doc(db, "reservas", "reserva_001"),

          {

            usuarioId: "uid_001",

            livroId: "livro_002",

            status: "esperando"
          }
        );



        // ====================================
        // CATEGORIAS
        // ====================================

        await setDoc(

          doc(db, "categorias", "cat_001"),

          {

            nome: "Literatura"
          }
        );



        await setDoc(

          doc(db, "categorias", "cat_002"),

          {

            nome: "Matemática"
          }
        );



        // ====================================
        // CONFIGURAÇÕES
        // ====================================

        await setDoc(

          doc(db, "configuracoes", "sistema"),

          {

            diasEmprestimo: 7,

            multaPorDia: 2,

            maxLivrosPorAluno: 3
          }
        );



        log.innerHTML = `

          <h2>
            Banco criado com sucesso!
          </h2>

          <p>
            Coleções criadas:
          </p>

          <ul>

            <li>usuarios</li>

            <li>livros</li>

            <li>emprestimos</li>

            <li>reservas</li>

            <li>categorias</li>

            <li>configuracoes</li>

          </ul>

        `;
      }


      catch (error) {

        console.log(error);

        log.innerHTML = `

          <h2>
            Erro ao criar banco
          </h2>

          <p>
            ${error.message}
          </p>

        `;
      }
    };

  </script>

</body>

</html>
