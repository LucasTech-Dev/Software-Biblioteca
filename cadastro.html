<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style/cadastro.css" />

  <title>Biblioteca Escolar — Cadastro</title>

  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  
</head>

<body>

  <div class="lb-card">

    <!-- Painel esquerdo -->
    <div class="left-panel">

      <div class="left-pattern"></div>

      <div class="left-top">
        <h1 class="left-title">
          Biblioteca<br />
          Escolar
        </h1>

        <p class="left-desc">
          Sistema integrado de gestão de acervo e empréstimos.
        </p>
      </div>

      <div class="left-bottom">
        <p class="left-quote">
          "Um livro é um sonho que você segura nas mãos."
        </p>
      </div>

    </div>

    <!-- Painel direito --> 
    <div class="right-panel">

      <div class="form-box">

        <div class="form-header">
          <h2>Criar Conta</h2>
          <p>Preencha os dados para registrar seu acesso</p>
        </div>

        <!-- Perfis -->
        <div class="role-group">

          <button
            type="button"
            class="role-opt"
            id="opt-professor"
            onclick="selectRole('professor')"
          >
            <div class="role-dot"></div>

            <div class="role-text">
              <strong>Professor</strong>
              
            </div>
          </button>

          <button
            type="button"
            class="role-opt"
            id="opt-aluno"
            onclick="selectRole('aluno')"
          >
            <div class="role-dot"></div>

            <div class="role-text">
              <strong>Aluno</strong>
             
            </div>
          </button>

        </div>

        <!-- Nome -->
        <div class="field">
          <label for="inp-nome">Nome completo</label>

          <input
            type="text"
            id="inp-nome"
            placeholder="Seu nome"
            autocomplete="off"
          />
        </div>

        <!-- Identificação -->
        <div class="field-cols">

          <div class="field">
            <label id="lbl-id" for="inp-id">Matrícula</label>

            <input
              type="text"
              id="inp-id"
              placeholder="—"
              autocomplete="off"
            />
          </div>

          <div class="field" id="wrap-turma">

            <label id="lbl-extra" for="inp-turma">Turma</label>

            <div class="select-wrap">

              <select id="inp-turma">
                <option value="">Selecione</option>
                <option>1º A</option>
                <option>1º B</option>
                <option>2º A</option>
                <option>2º B</option>
                <option>3º A</option>
                <option>3º B</option>
              </select>

            </div>
          </div>

        </div>

        <!-- Divider -->
        <div class="divider">
          <span>Credenciais de acesso</span>
        </div>

        <!-- Email -->
        <div class="field">

          <label for="inp-email">E-mail institucional</label>

          <input
            type="email"
            id="inp-email"
            placeholder="nome@escola.edu.br"
            autocomplete="off"
          />
        </div>

        <!-- Senha -->
        <div class="field">

          <label for="inp-senha">Senha</label>

          <input
            type="password"
            id="inp-senha"
            placeholder="••••••••"
            oninput="avaliarSenha(this.value)"
          />

          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>

          <div class="strength-label" id="lbl-forca"></div>

        </div>

        <!-- Confirmar senha -->
        <div class="field">

          <label for="inp-confirma">Confirmar senha</label>

          <input
            type="password"
            id="inp-confirma"
            placeholder="••••••••"
          />
        </div>

        <!-- Botão -->
        <button
          type="button"
          class="btn-submit"
          id="btn-cadastrar"
          onclick="handleCadastro()"
        >
          Criar conta
        </button>

        <!-- Feedback -->
        <div id="msg-feedback" class="msg"></div>

        <!-- Footer -->
        <div class="help-text">
          Já tem acesso?
          <a href="login.html">Entrar no sistema</a>
        </div>

      </div>
    </div>
  </div>

 <script type="module" src="script/cadastro.js"></script>


</body> 

</html>
