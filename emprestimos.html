<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/emprestimos.css">

  <title>BibliotecaEscolar — Empréstimos</title>

  <!-- FONTS -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">




    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/emprestimos.css">
  <title>Empréstimos</title>
  
</head>

<body>

  <!-- HEADER -->

  <header>
    <div class="logo-mark">Instituto Estadual Riachuelo</div>
    <div>Módulo Empréstimos</div>
  </header>

  <!-- HERO -->

  <div class="hero">


    <h1>
      Controle de <span>Empréstimos</span><br>
      e <span>Devoluções</span>
    </h1>

    <p>
      Gerencie retiradas, devoluções e acompanhe o status dos livros da biblioteca escolar.
    </p>

  </div>

  <!-- MAIN -->

  <main>

    <div class="actions">

      <button class="btn btn-primary">
        ➕ Novo Empréstimo
      </button>

      <button class="btn btn-secondary" id="btnDevolucao">
        📚 Registrar Devolução
      </button>

    </div>

    <!-- TABLE -->

    <div class="card">

      <table>

        <thead>
          <tr>
            <th>Aluno</th>
            <th>Livro</th>
            <th>Retirada</th>
            <th>Devolução</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Maria Oliveira</td>
            <td>Dom Casmurro</td>
            <td>10/05/2026</td>
            <td>17/05/2026</td>
            <td><span class="status delayed">Atrasado</span></td>
          </tr>

        </tbody>

      </table>

    </div>

  </main>

  <!-- SCRIPT -->

  <script src="script/emprestimos.js">
  </script>


    
<script src="script/emprestimos.js"></script>

</body>

</html>
