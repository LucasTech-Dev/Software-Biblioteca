<!DOCTYPE html>
<html>

  <meta charset="UTF-8">
  <title>Teste Firestore</title>

<body>

<h1>Teste Firestore</h1>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  initializeFirestore,
  doc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

self.FIRESTORE_FORCE_LONG_POLLING = true;

const firebaseConfig = {

  apiKey: "AIzaSyAFzy56P9sgF6DIXKfaXvwIR1dlnhKKiU8",

  authDomain: "bancobiblioteca-24029.firebaseapp.com",

  projectId: "bancobiblioteca-24029",

  storageBucket: "bancobiblioteca-24029.firebasestorage.app",

  messagingSenderId: "691451184435",

  appId: "1:691451184435:web:c5b7492af74bcf6a116a46"
};

const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {

  experimentalForceLongPolling: true,
  useFetchStreams: false

});

console.log("Firestore iniciado");

try {

  console.log("ANTES WRITE");

  await setDoc(
    doc(db, "teste", "teste1"),
    {
      nome: "FUNCIONOU"
    }
  );

  console.log("WRITE OK");

  document.body.innerHTML += `
    <h2 style="color:green">
      FUNCIONOU
    </h2>
  `;

}

catch(error) {

  console.error(error);

}

</script>
